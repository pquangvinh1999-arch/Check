<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Checking - By Vinh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- AI LIBRARIES -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --primary: #007bff; --cyan: #00f2ff; --bg: #f1f5f9; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; min-height: 100vh; color: #1e293b; }
        .tech-font { font-family: 'Orbitron', sans-serif; }

        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border: 1px solid white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
        .camera-viewport { position: relative; overflow: hidden; background: #000; border-radius: 20px; border: 4px solid white; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }

        /* MÁY QUÉT DỌC LIÊN TỤC */
        .laser-scanner {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(to right, transparent, var(--cyan), transparent);
            box-shadow: 0 0 20px var(--cyan); animation: moveLaser 3.5s linear infinite; z-index: 10; display: none;
        }
        @keyframes moveLaser { 0% { top: -2%; } 100% { top: 102%; } }

        /* HIỆU ỨNG LOÉ SÁNG (FLARE) KHI KHÓA MỤC TIÊU */
        #object-flare {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 10px; height: 10px; background: white; border-radius: 50%;
            box-shadow: 0 0 100px 50px white, 0 0 200px 100px var(--cyan);
            z-index: 30; animation: flareEffect 0.8s ease-out;
        }
        @keyframes flareEffect { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(5); opacity: 0; } }

        /* AVENGERS HUD NÂNG CẤP */
        #ai-hud { display: none; position: absolute; inset: 0; z-index: 20; pointer-events: none; }
        .hud-corner { position: absolute; width: 40px; height: 40px; border: 3px solid var(--cyan); filter: drop-shadow(0 0 8px var(--cyan)); }
        
        /* THANH ĐẾM NGƯỢC 2 GIÂY */
        #lock-timer {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 150px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; display: none;
        }
        #lock-progress { width: 0%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); transition: width 2s linear; }

        .btn-premium { background: linear-gradient(135deg, #0062ff, #00d4ff); color: white; transition: 0.4s; }
        .btn-premium:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 98, 255, 0.3); }

        #image-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); align-items: center; justify-content: center; }
        #zoom-img { transition: transform 0.3s ease; max-width: 85%; max-height: 80%; border-radius: 12px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-10 text-center">
        <h1 class="tech-font text-4xl md:text-5xl font-black mb-2 text-slate-900 tracking-tighter italic uppercase">
            Smart <span class="text-blue-600">AI</span> Checking
        </h1>
        <p class="text-slate-400 tracking-[0.4em] uppercase text-[10px] font-bold">Advanced Inventory System • <span class="text-blue-600">By Vinh</span></p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- CỘT TRÁI -->
        <div class="lg:col-span-5 space-y-8">
            <div class="glass-card p-6">
                <div class="flex items-center justify-between mb-6 text-sm">
                    <h2 class="font-black text-slate-800 tech-font"><i class="fas fa-crosshairs mr-2 text-blue-600"></i> AI RADAR</h2>
                    <span id="sys-status" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold text-[9px] uppercase tracking-widest border border-blue-100 italic">Initializing...</span>
                </div>
                
                <div class="camera-viewport aspect-video flex items-center justify-center">
                    <div id="laser" class="laser-scanner"></div>
                    <div id="object-flare"></div> <!-- Loé sáng khi nhận diện -->
                    
                    <div id="lock-timer"><div id="lock-progress"></div></div> <!-- Thanh đếm ngược -->

                    <div id="ai-hud">
                        <div class="hud-corner top-[20px] left-[20px] border-r-0 border-b-0"></div>
                        <div class="hud-corner top-[20px] right-[20px] border-l-0 border-b-0"></div>
                        <div class="hud-corner bottom-[20px] left-[20px] border-r-0 border-t-0"></div>
                        <div class="hud-corner bottom-[20px] right-[20px] border-l-0 border-t-0"></div>
                        <div id="hud-status" class="absolute bottom-8 left-50 transform -translate-x-1/2 text-cyan-400 text-[9px] tech-font tracking-widest w-full text-center">HOLD STEADY...</div>
                    </div>

                    <i id="placeholder" class="fas fa-video text-6xl text-slate-800"></i>
                    <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline></video>
                    <canvas id="canvas" width="224" height="224" class="hidden"></canvas>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="startCamera()" class="btn-premium py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest"><i class="fas fa-bolt mr-2 text-sm"></i> Kích hoạt Cam</button>
                    <button id="scan-btn" onclick="runAIScan()" class="bg-slate-900 text-white py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest hover:bg-black transition shadow-xl"><i class="fas fa-atom mr-2 text-sm"></i> Tìm AI</button>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="font-bold text-slate-800 text-xs uppercase tracking-widest mb-4 flex items-center"><i class="fas fa-plus-circle mr-2 text-indigo-500"></i> Register New Item</h3>
                <div class="space-y-4">
                    <input type="text" id="new-id" placeholder="ID (Ví dụ: 8383R)" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm outline-none">
                    <input type="text" id="new-code" placeholder="Mã hàng hóa..." class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm outline-none">
                    <button class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest">Push to database</button>
                </div>
            </div>
        </div>

        <!-- CỘT PHẢI -->
        <div class="lg:col-span-7 space-y-6">
            <div class="glass-card p-4 flex gap-4">
                <input type="text" id="filter-code" onkeyup="filterData()" placeholder="Search PN Number..." class="flex-grow bg-transparent p-2 outline-none text-sm font-semibold">
                <input type="text" id="filter-id" onkeyup="filterData()" placeholder="ID..." class="w-24 bg-slate-50 border-none rounded-xl p-2 text-center text-xs font-bold outline-none">
            </div>

            <div class="glass-card p-8">
                <h2 class="font-black text-slate-800 text-sm tech-font mb-6 flex items-center justify-between uppercase">
                    AI Filtered (90-100%) <span id="count-label" class="text-[10px] font-bold bg-blue-600 text-white px-2 py-1 rounded">0 RECORDS</span>
                </h2>
                <div id="product-list" class="space-y-4 max-h-[550px] overflow-y-auto pr-2">
                    <!-- List items -->
                </div>
            </div>
        </div>
    </main>

    <!-- IMAGE MODAL -->
    <div id="image-modal">
        <div class="absolute top-8 right-8 cursor-pointer w-12 h-12 flex items-center justify-center bg-slate-900 text-white rounded-full z-[1100]" onclick="closeModal()">
            <i class="fas fa-times text-xl"></i>
        </div>
        <div class="relative w-full h-full flex items-center justify-center p-10">
            <img id="zoom-img" src="" draggable="false">
        </div>
        <div class="absolute bottom-10 bg-white shadow-2xl px-8 py-5 rounded-3xl flex items-center gap-10 border border-slate-100">
            <button onclick="adjustZoom(-0.3)" class="text-slate-400 hover:text-blue-600 transition"><i class="fas fa-minus-circle text-2xl"></i></button>
            <input type="range" id="zoom-range" min="0.5" max="3" step="0.1" value="1" oninput="applyZoom(this.value)" class="w-40 accent-blue-600">
            <button onclick="adjustZoom(0.3)" class="text-slate-400 hover:text-blue-600 transition"><i class="fas fa-plus-circle text-2xl"></i></button>
            <button onclick="rotateImage()" class="text-slate-400 hover:text-blue-600 border-l pl-8"><i class="fas fa-sync-alt text-xl"></i></button>
        </div>
    </div>

    <script>
        const GAS_URL = "DÁN_WEB_APP_URL_CỦA_ANH_VÀO_ĐÂY";
        let inventoryData = [];
        let net;
        let currentScale = 1;
        let currentRotation = 0;

        async function initAI() {
            try {
                net = await mobilenet.load();
                document.getElementById('sys-status').innerText = "AI ONLINE";
                document.getElementById('sys-status').className = "bg-green-50 text-green-600 px-3 py-1 rounded-full font-bold text-[9px] uppercase tracking-widest border border-green-100 italic";
            } catch (e) { document.getElementById('sys-status').innerText = "AI ERROR"; }
        }

        async function loadData() {
            try {
                const response = await fetch(GAS_URL);
                inventoryData = await response.json();
                renderList(inventoryData);
            } catch (err) {
                // Fake data để anh test lọc 90%
                inventoryData = [
                    { id: "8383R", code: "3478290301", desc: "KHỚP 95% MẪU", img: "https://via.placeholder.com/600", vector: "0.1|0.2|0.3" },
                    { id: "1234A", code: "PN-SAMPLE-1", desc: "KHÔNG KHỚP", img: "https://via.placeholder.com/600", vector: "0.9|0.8|0.7" }
                ];
                renderList(inventoryData);
            }
        }

        // --- THUẬT TOÁN TÌM KIẾM AI NÂNG CẤP ---
        async function runAIScan() {
            if (!net) return alert("AI chưa sẵn sàng!");
            const video = document.getElementById('video');
            if (video.classList.contains('hidden')) return alert("Hãy mở camera trước!");

            // 1. Khởi động UI chờ 2 giây
            document.getElementById('ai-hud').style.display = 'block';
            document.getElementById('lock-timer').style.display = 'block';
            const progress = document.getElementById('lock-progress');
            progress.style.width = '0%';
            
            // Ép trình duyệt render lại thanh progress
            setTimeout(() => progress.style.width = '100%', 50);

            // 2. Chờ 2 giây để giữ im camera
            await new Promise(resolve => setTimeout(resolve, 2000));

            // 3. Hiệu ứng loé sáng (Flare) khi khóa mục tiêu thành công
            const flare = document.getElementById('object-flare');
            flare.style.display = 'block';
            setTimeout(() => flare.style.display = 'none', 800);

            // 4. Phân tích ảnh
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 224, 224);
            const activation = net.infer(canvas, true);
            const capturedVector = await activation.data();

            // 5. So sánh và LỌC 90-100%
            let results = inventoryData.map(item => {
                if (!item.vector) return { ...item, score: 0 };
                const dbVector = item.vector.split('|').map(Number);
                const score = cosineSimilarity(capturedVector, dbVector);
                return { ...item, score: score };
            });

            // CHỈ GIỮ LẠI NHỮNG MỤC >= 90% (0.9)
            const filteredResults = results.filter(item => item.score >= 0.90);
            filteredResults.sort((a, b) => b.score - a.score);

            // 6. Hoàn tất UI
            document.getElementById('ai-hud').style.display = 'none';
            document.getElementById('lock-timer').style.display = 'none';
            
            renderList(filteredResults);

            if(filteredResults.length === 0) {
                alert("Không tìm thấy vật thể nào khớp trên 90%!");
            }
        }

        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, mA = 0, mB = 0;
            // Trong thực tế MobileNet vector rất dài, ở đây ta demo logic
            const length = Math.min(vecA.length, vecB.length);
            for (let i = 0; i < length; i++) {
                dotProduct += vecA[i] * vecB[i];
                mA += vecA[i] * vecA[i];
                mB += vecB[i] * vecB[i];
            }
            if (mA === 0 || mB === 0) return 0;
            return dotProduct / (Math.sqrt(mA) * Math.sqrt(mB));
        }

        function renderList(data) {
            const listContainer = document.getElementById('product-list');
            document.getElementById('count-label').innerText = `${data.length} MATCHES`;
            listContainer.innerHTML = '';
            data.forEach(item => {
                const matchPercent = item.score ? (item.score * 100).toFixed(1) : 0;
                listContainer.innerHTML += `
                    <div class="flex items-center gap-5 p-4 bg-white border border-slate-50 rounded-[20px] hover:border-blue-400 hover:shadow-xl transition-all duration-500 group">
                        <div class="w-16 h-16 rounded-2xl overflow-hidden bg-slate-100 cursor-zoom-in" onclick="openModal('${item.img}')">
                            <img src="${item.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>
                        <div class="flex-grow">
                            <h4 class="font-bold text-slate-800 text-sm tracking-tight mb-1">${item.code}</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">ID: ${item.id} • ${item.desc}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] text-blue-600 font-black block bg-blue-50 px-2 py-1 rounded-lg mb-1">${matchPercent}% MATCH</span>
                            <button onclick="openModal('${item.img}')" class="w-8 h-8 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all">
                                <i class="fas fa-expand-alt text-xs"></i>
                            </button>
                        </div>
                    </div>`;
            });
        }

        async function startCamera() {
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
                document.getElementById('laser').style.display = 'block';
            } catch (err) { alert("Vui lòng cấp quyền Camera!"); }
        }

        function openModal(src) {
            document.getElementById('zoom-img').src = src;
            document.getElementById('image-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            applyZoom(1);
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function applyZoom(val) {
            currentScale = val;
            document.getElementById('zoom-range').value = val;
            document.getElementById('zoom-img').style.transform = `scale(${currentScale}) rotate(${currentRotation}deg)`;
        }

        function adjustZoom(delta) {
            let newZoom = parseFloat(currentScale) + delta;
            if(newZoom >= 0.5 && newZoom <= 3) applyZoom(newZoom);
        }

        function rotateImage() { currentRotation += 90; applyZoom(currentScale); }

        function filterData() {
            const codeVal = document.getElementById('filter-code').value.toLowerCase();
            const idVal = document.getElementById('filter-id').value.toLowerCase();
            const filtered = inventoryData.filter(item => 
                String(item.code).toLowerCase().includes(codeVal) && String(item.id).toLowerCase().includes(idVal)
            );
            renderList(filtered);
        }

        initAI();
        loadData();
    </script>
</body>
</html>
