<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Checking - By Vinh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- AI LIBRARIES -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --primary: #007bff; --cyan: #00f2ff; --bg: #f1f5f9; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; min-height: 100vh; color: #1e293b; }
        .tech-font { font-family: 'Orbitron', sans-serif; }

        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border: 1px solid white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
        .camera-viewport { position: relative; overflow: hidden; background: #000; border-radius: 20px; border: 4px solid white; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }

        /* MÁY QUÉT DỌC LIÊN TỤC */
        .laser-scanner {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(to right, transparent, var(--cyan), #fff, var(--cyan), transparent);
            box-shadow: 0 0 25px var(--cyan); animation: moveLaser 3.5s linear infinite; z-index: 20; display: none;
        }
        @keyframes moveLaser { 0% { top: -2%; } 100% { top: 102%; } }

        /* WIREFRAME LAYER - TẬP TRUNG VÀO VẬT THỂ */
        #holo-canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
            z-index: 15; pointer-events: none; mix-blend-mode: screen;
        }

        /* AVENGERS HUD */
        #ai-hud { display: none; position: absolute; inset: 0; z-index: 30; pointer-events: none; }
        .hud-corner { position: absolute; width: 30px; height: 30px; border: 2px solid var(--cyan); filter: drop-shadow(0 0 8px var(--cyan)); opacity: 0.5; }
        
        /* THANH TIẾN TRÌNH KHÓA MỤC TIÊU */
        #lock-timer {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 180px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; display: none; z-index: 35;
        }
        #lock-progress { width: 0%; height: 100%; background: var(--cyan); box-shadow: 0 0 15px var(--cyan); transition: width 2s linear; }

        #object-flare {
            display: none; position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%;
            box-shadow: 0 0 80px 40px white, 0 0 150px 80px var(--cyan);
            z-index: 40; animation: flareEffect 0.6s ease-out forwards;
        }
        @keyframes flareEffect { 0% { scale: 0; opacity: 1; } 100% { scale: 8; opacity: 0; } }

        .btn-premium { background: linear-gradient(135deg, #0062ff, #00d4ff); color: white; transition: 0.4s; }
        .btn-premium:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 98, 255, 0.3); }

        #image-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); align-items: center; justify-content: center; }
        #zoom-img { transition: transform 0.3s ease; max-width: 85%; max-height: 80%; border-radius: 12px; }

        .haptic-shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-3px, 3px); } 75% { transform: translate(3px, -3px); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-10 text-center">
        <h1 class="tech-font text-4xl md:text-5xl font-black mb-2 text-slate-900 tracking-tighter italic uppercase">
            Smart <span class="text-blue-600 font-black">AI</span> Checking
        </h1>
        <p class="text-slate-400 tracking-[0.4em] uppercase text-[10px] font-bold">Advanced Inventory System • <span class="text-blue-600">By Vinh</span></p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-5 space-y-8">
            <div class="glass-card p-6" id="radar-card">
                <div class="flex items-center justify-between mb-6 text-sm">
                    <h2 class="font-black text-slate-800 tech-font uppercase italic text-[11px]"><i class="fas fa-microchip mr-2 text-blue-600"></i> AI RADAR v3.0</h2>
                    <span id="sys-status" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold text-[9px] uppercase tracking-widest border border-blue-100 italic">SYSTEM STANDBY</span>
                </div>
                
                <div class="camera-viewport aspect-video flex items-center justify-center" id="cam-container">
                    <div id="laser" class="laser-scanner"></div>
                    <canvas id="holo-canvas"></canvas> 
                    
                    <div id="object-flare"></div>
                    <div id="lock-timer"><div id="lock-progress"></div></div>

                    <div id="ai-hud">
                        <div class="hud-corner top-[20px] left-[20px] border-r-0 border-b-0"></div>
                        <div class="hud-corner top-[20px] right-[20px] border-l-0 border-b-0"></div>
                        <div class="hud-corner bottom-[20px] left-[20px] border-r-0 border-t-0"></div>
                        <div class="hud-corner bottom-[20px] right-[20px] border-l-0 border-t-0"></div>
                        <div id="hud-status" class="absolute bottom-8 left-0 w-full text-cyan-400 text-[9px] tech-font tracking-[0.3em] text-center uppercase">Target Locking...</div>
                    </div>

                    <i id="placeholder" class="fas fa-video text-6xl text-slate-800 opacity-20"></i>
                    <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline crossorigin="anonymous"></video>
                    <canvas id="canvas" width="224" height="224" class="hidden"></canvas>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="startCamera()" class="btn-premium py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest"><i class="fas fa-power-off mr-2 text-sm"></i> Kích hoạt Cam</button>
                    <button id="scan-btn" onclick="runTargetScan()" class="bg-slate-900 text-white py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest hover:bg-black transition shadow-xl"><i class="fas fa-atom mr-2 text-sm"></i> Tìm AI</button>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="font-bold text-slate-800 text-xs uppercase tracking-widest mb-4 flex items-center"><i class="fas fa-plus-circle mr-2 text-indigo-500"></i> Register New Item</h3>
                <div class="space-y-4 text-sm">
                    <input type="text" id="new-id" placeholder="ID (Ví dụ: 8383R)" class="w-full bg-white border border-slate-200 rounded-xl p-3 outline-none">
                    <input type="text" id="new-code" placeholder="Mã hàng hóa..." class="w-full bg-white border border-slate-200 rounded-xl p-3 outline-none">
                    <button class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-slate-200 transition">Push to database</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="glass-card p-4 flex gap-4 shadow-sm">
                <input type="text" id="filter-code" onkeyup="filterData()" placeholder="Search PN Number..." class="flex-grow bg-transparent p-2 outline-none text-sm font-semibold">
                <input type="text" id="filter-id" onkeyup="filterData()" placeholder="ID..." class="w-24 bg-slate-50 border-none rounded-xl p-2 text-center text-xs font-bold outline-none">
            </div>

            <div class="glass-card p-8">
                <h2 class="font-black text-slate-800 text-sm tech-font mb-6 flex items-center justify-between uppercase italic">
                    AI Filtered (90-100%) <span id="count-label" class="text-[10px] font-bold bg-blue-600 text-white px-3 py-1.5 rounded-full">0 RECORDS</span>
                </h2>
                <div id="product-list" class="space-y-4 max-h-[550px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </main>

    <div id="image-modal">
        <div class="absolute top-8 right-8 cursor-pointer w-12 h-12 flex items-center justify-center bg-slate-900 text-white rounded-full z-[1100]" onclick="closeModal()">
            <i class="fas fa-times text-xl"></i>
        </div>
        <div class="relative w-full h-full flex items-center justify-center p-10">
            <img id="zoom-img" src="" draggable="false" referrerpolicy="no-referrer">
        </div>
        <div class="absolute bottom-10 bg-white/90 shadow-2xl px-8 py-5 rounded-3xl flex items-center gap-10 backdrop-blur-md">
            <button onclick="adjustZoom(-0.3)" class="text-slate-400 hover:text-blue-600 transition"><i class="fas fa-minus-circle text-2xl"></i></button>
            <input type="range" id="zoom-range" min="0.5" max="3" step="0.1" value="1" oninput="applyZoom(this.value)" class="w-40 accent-blue-600">
            <button onclick="adjustZoom(0.3)" class="text-slate-400 hover:text-blue-600 transition"><i class="fas fa-plus-circle text-2xl"></i></button>
            <button onclick="rotateImage()" class="text-slate-400 hover:text-blue-600 border-l pl-8"><i class="fas fa-sync-alt text-xl"></i></button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzm6mmH5It0vXdPn38Onn3ouwlawvIdwVzDXF8tSNoT6HFDGwT5_piL5Oir5JnYU08kBg/exec";
        let inventoryData = [];
        let net;
        let currentScale = 1;
        let currentRotation = 0;
        let isScanning = false;

        async function initAI() {
            try {
                net = await mobilenet.load();
                document.getElementById('sys-status').innerText = "AI ONLINE";
                document.getElementById('sys-status').className = "bg-green-50 text-green-600 px-3 py-1 rounded-full font-bold text-[9px] uppercase tracking-widest border border-green-100 italic";
            } catch (e) { document.getElementById('sys-status').innerText = "AI ERROR"; }
        }

        async function loadData() {
            try {
                const response = await fetch(GAS_URL);
                inventoryData = await response.json();
                renderList(inventoryData);
            } catch (err) { console.error("Data error"); }
        }

        // --- HIỆU ỨNG TARGET SCAN TINH TẾ ---
        async function runTargetScan() {
            if (!net || isScanning) return;
            const video = document.getElementById('video');
            if (video.classList.contains('hidden')) return alert("Hãy mở camera trước!");

            isScanning = true;
            const holoCanvas = document.getElementById('holo-canvas');
            const ctx = holoCanvas.getContext('2d');
            
            document.getElementById('ai-hud').style.display = 'block';
            document.getElementById('lock-timer').style.display = 'block';
            const progress = document.getElementById('lock-progress');
            progress.style.width = '0%';
            setTimeout(() => progress.style.width = '100%', 50);

            const startTime = Date.now();
            holoCanvas.width = video.videoWidth;
            holoCanvas.height = video.videoHeight;

            // 1. Thuật toán tìm vùng linh kiện (Bounding Box) dựa trên độ tương phản
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 100; tempCanvas.height = 75; // Thu nhỏ để xử lý nhanh
            const tCtx = tempCanvas.getContext('2d');

            function getObjectBounds() {
                tCtx.drawImage(video, 0, 0, 100, 75);
                const pixels = tCtx.getImageData(0, 0, 100, 75).data;
                let minX = 100, maxX = 0, minY = 75, maxY = 0;
                let found = false;

                for (let y = 0; y < 75; y++) {
                    for (let x = 0; x < 100; x++) {
                        const i = (y * 100 + x) * 4;
                        const brightness = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                        // Giả định linh kiện tối hơn nền sáng hoặc ngược lại
                        if (brightness < 100) { 
                            if (x < minX) minX = x; if (x > maxX) maxX = x;
                            if (y < minY) minY = y; if (y > maxY) maxY = y;
                            found = true;
                        }
                    }
                }
                if (!found) return { x: 25, y: 20, w: 50, h: 40 }; // Default box nếu không tìm thấy
                return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
            }

            const bounds = getObjectBounds();
            const realX = (bounds.x / 100) * holoCanvas.width;
            const realY = (bounds.y / 75) * holoCanvas.height;
            const realW = (bounds.w / 100) * holoCanvas.width;
            const realH = (bounds.h / 75) * holoCanvas.height;

            // 2. Animation Wireframe chỉ trong vùng linh kiện
            function animateWireframe() {
                if (!isScanning) return;
                if (Date.now() - startTime > 2000) return;

                ctx.clearRect(0, 0, holoCanvas.width, holoCanvas.height);
                
                // Vẽ khung Shimmer bao quanh linh kiện
                ctx.save();
                ctx.beginPath();
                ctx.rect(realX - 10, realY - 10, realW + 20, realH + 20);
                ctx.clip(); // Chỉ vẽ bên trong vùng này

                // Vẽ lưới Shimmer
                ctx.strokeStyle = '#00f2ff';
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.4;
                const step = 20;
                const shift = (Date.now() / 15) % step;
                
                for(let i = realX - step; i < realX + realW + step; i += step) {
                    ctx.moveTo(i + shift, realY);
                    ctx.lineTo(i + shift - 10, realY + realH);
                }
                for(let j = realY - step; j < realY + realH + step; j += step) {
                    ctx.moveTo(realX, j + shift);
                    ctx.lineTo(realX + realW, j + shift - 10);
                }
                ctx.stroke();

                // Vẽ các điểm lấp lánh (Sparkles)
                ctx.globalAlpha = 1;
                for(let i=0; i<8; i++) {
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
                    ctx.fillRect(realX + Math.random()*realW, realY + Math.random()*realH, 2, 2);
                }
                ctx.restore();

                requestAnimationFrame(animateWireframe);
            }
            animateWireframe();

            await new Promise(resolve => setTimeout(resolve, 2000));

            // 3. Hiệu ứng Flare tại vị trí linh kiện
            isScanning = false;
            const flare = document.getElementById('object-flare');
            flare.style.left = (realX + realW/2) + 'px';
            flare.style.top = (realY + realH/2) + 'px';
            flare.style.display = 'block';
            document.getElementById('cam-container').classList.add('haptic-shake');

            setTimeout(() => {
                flare.style.display = 'none';
                document.getElementById('cam-container').classList.remove('haptic-shake');
                document.getElementById('ai-hud').style.display = 'none';
                document.getElementById('lock-timer').style.display = 'none';
                ctx.clearRect(0, 0, holoCanvas.width, holoCanvas.height);
            }, 600);

            // AI Processing
            const canvas = document.getElementById('canvas');
            const aiCtx = canvas.getContext('2d');
            aiCtx.drawImage(video, 0, 0, 224, 224);
            const activation = net.infer(canvas, true);
            const capturedVector = await activation.data();

            let results = inventoryData.map(item => {
                if (!item.vector) return { ...item, score: 0 };
                const dbVector = item.vector.split('|').map(Number);
                const score = cosineSimilarity(capturedVector, dbVector);
                return { ...item, score: score };
            });

            const filteredResults = results.filter(item => item.score >= 0.90);
            filteredResults.sort((a, b) => b.score - a.score);
            renderList(filteredResults);
            if(filteredResults.length === 0) alert("Mục tiêu không xác định (Khớp < 90%)");
        }

        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, mA = 0, mB = 0;
            const length = Math.min(vecA.length, vecB.length);
            for (let i = 0; i < length; i++) {
                dotProduct += vecA[i] * vecB[i];
                mA += vecA[i] * vecA[i];
                mB += vecB[i] * vecB[i];
            }
            return (mA === 0 || mB === 0) ? 0 : dotProduct / (Math.sqrt(mA) * Math.sqrt(mB));
        }

        function renderList(data) {
            const listContainer = document.getElementById('product-list');
            document.getElementById('count-label').innerText = `${data.length} RECORDS`;
            listContainer.innerHTML = '';
            data.forEach(item => {
                const matchPercent = item.score ? (item.score * 100).toFixed(1) : 0;
                listContainer.innerHTML += `
                    <div class="flex items-center gap-5 p-4 bg-white border border-slate-50 rounded-[20px] hover:border-blue-400 hover:shadow-xl transition-all duration-500 group">
                        <div class="w-16 h-16 rounded-2xl overflow-hidden bg-slate-100 cursor-zoom-in" onclick="openModal('${item.img}')">
                            <img src="${item.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                        </div>
                        <div class="flex-grow text-sm">
                            <h4 class="font-bold text-slate-800 tracking-tight mb-1 font-mono italic">${item.code}</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">ID: ${item.id} • ${item.desc}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] text-blue-600 font-black block bg-blue-50 px-3 py-1.5 rounded-full mb-1 italic border border-blue-100">${matchPercent}% MATCH</span>
                            <button onclick="openModal('${item.img}')" class="w-8 h-8 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                <i class="fas fa-expand-alt text-xs"></i>
                            </button>
                        </div>
                    </div>`;
            });
        }

        async function startCamera() {
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
                document.getElementById('laser').style.display = 'block';
            } catch (err) { alert("Camera error!"); }
        }

        function openModal(src) {
            document.getElementById('zoom-img').src = src;
            document.getElementById('image-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            applyZoom(1);
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function applyZoom(val) {
            currentScale = val;
            document.getElementById('zoom-range').value = val;
            document.getElementById('zoom-img').style.transform = `scale(${currentScale}) rotate(${currentRotation}deg)`;
        }

        function adjustZoom(delta) {
            let newZoom = parseFloat(currentScale) + delta;
            if(newZoom >= 0.5 && newZoom <= 3) applyZoom(newZoom);
        }

        function rotateImage() { currentRotation += 90; applyZoom(currentScale); }

        function filterData() {
            const codeVal = document.getElementById('filter-code').value.toLowerCase();
            const idVal = document.getElementById('filter-id').value.toLowerCase();
            const filtered = inventoryData.filter(item => 
                String(item.code).toLowerCase().includes(codeVal) && String(item.id).toLowerCase().includes(idVal)
            );
            renderList(filtered);
        }

        initAI();
        loadData();
    </script>
</body>
</html>
