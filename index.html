<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Scanner PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root { --cyan:#00f2ff; }

/* CAMERA */
.camera-viewport{
    position:relative;
    background:#000;
    border-radius:20px;
    overflow:hidden;
}

/* LASER */
.laser{
    position:absolute;
    width:100%;
    height:3px;
    background:linear-gradient(to right,transparent,#00f2ff,white,#00f2ff,transparent);
    animation:scan 2s linear infinite;
}
@keyframes scan{
    0%{top:0}
    100%{top:100%}
}

/* SCAN RING */
.scan-ring{
    position:absolute;
    border:2px solid var(--cyan);
    border-radius:50%;
    animation:pulse 1.2s infinite;
}
@keyframes pulse{
    0%{transform:scale(0.7);opacity:1}
    100%{transform:scale(1.5);opacity:0}
}

/* SHAKE */
.shake{
    animation:shake 0.2s;
}
@keyframes shake{
    25%{transform:translate(5px,0)}
    75%{transform:translate(-5px,0)}
}
</style>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl font-bold mb-6">AI SCANNER</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<!-- CAMERA -->
<div class="bg-white p-4 rounded-xl shadow">

<div id="cam" class="camera-viewport aspect-video flex items-center justify-center">

<div id="laser" class="laser hidden"></div>

<video id="video" class="absolute w-full h-full object-cover hidden" autoplay playsinline></video>

<canvas id="canvas" width="224" height="224" class="hidden"></canvas>

<i id="placeholder" class="fas fa-camera text-5xl text-gray-400"></i>

</div>

<div class="mt-4 flex gap-4">
<button onclick="startCamera()" class="bg-blue-600 text-white px-4 py-2 rounded">Mở Cam</button>
<button onclick="scanAI()" class="bg-black text-white px-4 py-2 rounded">Scan AI</button>
</div>

</div>

<!-- RESULT -->
<div class="bg-white p-4 rounded-xl shadow">

<h2 class="font-bold mb-3">Kết quả ≥ 90%</h2>

<div id="list" class="space-y-3"></div>

</div>

</div>
</div>

<script type="module">

import { AutoModel, AutoImageProcessor, RawImage } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

let model, processor;
let data = [];
let scanning=false;

/* LOAD AI */
async function initAI(){
    processor = await AutoImageProcessor.from_pretrained('Xenova/dinov2-small');
    model = await AutoModel.from_pretrained('Xenova/dinov2-small',{quantized:true});
}

/* LOAD DATA */
async function loadData(){
    const res = await fetch("YOUR_GAS_URL");
    data = await res.json();
    render(data);
}

/* CAMERA */
window.startCamera = async ()=>{
    const v=document.getElementById('video');
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    v.srcObject=stream;
    v.classList.remove('hidden');
    document.getElementById('placeholder').classList.add('hidden');
    document.getElementById('laser').classList.remove('hidden');
}

/* SCAN */
window.scanAI = async ()=>{

if(scanning || !model) return;
const video=document.getElementById('video');
if(video.classList.contains('hidden')) return alert("Bật cam trước");

scanning=true;

/* EFFECT */
const ring=document.createElement('div');
ring.className='scan-ring';
ring.style.width='150px';
ring.style.height='150px';
ring.style.left='50%';
ring.style.top='50%';
ring.style.transform='translate(-50%,-50%)';

document.getElementById('cam').appendChild(ring);

/* WAIT */
await new Promise(r=>setTimeout(r,1500));

/* CAPTURE */
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

ctx.drawImage(video,0,0,224,224);

/* TÁCH NỀN TRẮNG */
let imgData=ctx.getImageData(0,0,224,224);
let d=imgData.data;

for(let i=0;i<d.length;i+=4){
    let avg=(d[i]+d[i+1]+d[i+2])/3;

    if(avg>200){
        d[i]=255;d[i+1]=255;d[i+2]=255;
    }else{
        d[i]*=1.3;
        d[i+1]*=1.3;
        d[i+2]*=1.3;
    }
}

ctx.putImageData(imgData,0,0);

/* AI */
const blob=await new Promise(r=>canvas.toBlob(r));
const url=URL.createObjectURL(blob);

const img=await RawImage.fromURL(url);
const input=await processor(img);
const out=await model(input);

const vec=Array.from(out.last_hidden_state.mean(1).data);

URL.revokeObjectURL(url);

/* MATCH */
let result=data.map(i=>{

    if(!i.vector) return {...i,score:0};

    let v=i.vector.split('|').map(Number);

    let dot=0,a=0,b=0;

    for(let j=0;j<vec.length;j++){
        dot+=vec[j]*v[j];
        a+=vec[j]*vec[j];
        b+=v[j]*v[j];
    }

    let score=dot/(Math.sqrt(a)*Math.sqrt(b));

    return {...i,score};
});

/* FILTER >=90% */
let filtered=result
.filter(i=>i.score>=0.9)
.sort((a,b)=>b.score-a.score)
.slice(0,5);

/* EFFECT DONE */
ring.remove();

document.getElementById('cam').classList.add('shake');
setTimeout(()=>document.getElementById('cam').classList.remove('shake'),200);

/* RENDER */
render(filtered);

if(filtered.length===0) alert("Không tìm thấy!");

scanning=false;

};

/* RENDER */
function render(arr){

let html="";

arr.forEach(i=>{

let p=i.score? (i.score*100).toFixed(2):0;

html+=`
<div class="flex items-center gap-4 border p-3 rounded">

<img src="${i.url_hinh}" 
class="w-16 h-16 object-cover rounded"
onerror="this.src='https://via.placeholder.com/150'">

<div class="flex-1">
<div class="font-bold">${i.malieu}</div>
<div class="text-xs text-gray-400">ID: ${i.id}</div>
</div>

<div class="text-blue-600 font-bold">${p}%</div>

</div>`;
});

document.getElementById('list').innerHTML=html;

}

/* INIT */
initAI();
loadData();

</script>

</body>
</html>
