<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Checking - By Vinh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- AI LIBRARIES -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root { --primary: #007bff; --cyan: #00f2ff; --bg: #f1f5f9; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; min-height: 100vh; color: #1e293b; }
        .tech-font { font-family: 'Orbitron', sans-serif; }

        /* GLASSMORPHISM UI */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }

        /* KHUNG CAMERA CHUYÊN NGHIỆP */
        .camera-viewport {
            position: relative;
            overflow: hidden;
            background: #000;
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        /* 1. HIỆU ỨNG MÁY QUÉT DỌC LIÊN TỤC */
        .laser-scanner {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(to right, transparent, var(--cyan), transparent);
            box-shadow: 0 0 20px var(--cyan);
            animation: moveLaser 3.5s linear infinite;
            z-index: 10;
            display: none; /* Chỉ hiện khi bật cam */
        }
        @keyframes moveLaser {
            0% { top: -2%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 102%; opacity: 0; }
        }

        /* 2. HIỆU ỨNG AVENGERS HUD (KHI QUÉT AI) */
        #ai-hud {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            border: 2px solid rgba(0, 242, 255, 0.3);
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
        }
        .hud-corner { position: absolute; width: 40px; height: 40px; border: 3px solid var(--cyan); filter: drop-shadow(0 0 8px var(--cyan)); }
        .hud-top-l { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .hud-top-r { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .hud-bot-l { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .hud-bot-r { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }
        
        .matching-bar {
            position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            color: var(--cyan); font-family: 'Orbitron'; font-size: 10px;
            letter-spacing: 4px; text-transform: uppercase;
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* BUTTONS & INPUTS */
        .btn-premium {
            background: linear-gradient(135deg, #0062ff, #00d4ff);
            color: white; font-weight: 700; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-premium:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 98, 255, 0.3); }

        .input-premium {
            background: #ffffff; border: 1px solid #e2e8f0;
            border-radius: 14px; padding: 12px 16px; font-size: 14px;
            transition: 0.3s; outline: none;
        }
        .input-premium:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1); }

        /* MODAL */
        #image-modal {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            align-items: center; justify-content: center;
        }
        #zoom-img { transition: transform 0.3s ease; max-width: 85%; max-height: 80%; border-radius: 12px; box-shadow: 0 40px 100px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- HEADER -->
    <header class="max-w-6xl mx-auto mb-10 text-center">
        <h1 class="tech-font text-4xl md:text-5xl font-black mb-2 text-slate-900 tracking-tighter italic">
            SMART <span class="text-blue-600">AI</span> CHECKING
        </h1>
        <div class="h-1 w-20 bg-blue-600 mx-auto rounded-full mb-2"></div>
        <p class="text-slate-400 tracking-[0.4em] uppercase text-[10px] font-bold">Advanced Inventory Control • <span class="text-blue-600">By Vinh</span></p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- CỘT TRÁI -->
        <div class="lg:col-span-5 space-y-8">
            <div class="glass-card p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="font-black text-slate-800 text-sm tracking-widest tech-font uppercase"><i class="fas fa-crosshairs mr-2 text-blue-600"></i> AI RADAR</h2>
                    <span id="sys-status" class="text-[9px] font-black bg-blue-50 text-blue-600 px-3 py-1 rounded-full border border-blue-100 uppercase tracking-tighter">Initializing AI...</span>
                </div>
                
                <div class="camera-viewport aspect-video flex items-center justify-center">
                    <!-- Laser Scanner -->
                    <div id="laser" class="laser-scanner"></div>
                    
                    <!-- Avengers HUD -->
                    <div id="ai-hud">
                        <div class="hud-corner hud-top-l"></div>
                        <div class="hud-corner hud-top-r"></div>
                        <div class="hud-corner hud-bot-l"></div>
                        <div class="hud-corner hud-bot-r"></div>
                        <div class="matching-bar">Matching Data Matrix...</div>
                    </div>

                    <i id="placeholder" class="fas fa-video text-6xl text-slate-800"></i>
                    <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline></video>
                    <canvas id="canvas" width="224" height="224" class="hidden"></canvas>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="startCamera()" class="btn-premium py-4 rounded-2xl text-[11px] uppercase tracking-widest"><i class="fas fa-bolt mr-2"></i> Kích hoạt Cam</button>
                    <button onclick="runAIScan()" class="bg-slate-900 text-white py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest hover:bg-black transition shadow-xl shadow-slate-200"><i class="fas fa-atom mr-2"></i> Tìm AI</button>
                </div>
            </div>

            <div class="glass-card p-6">
                <h3 class="font-bold text-slate-800 text-xs uppercase tracking-widest mb-4 flex items-center"><i class="fas fa-plus-circle mr-2 text-indigo-500"></i> Register New Item</h3>
                <div class="space-y-4">
                    <input type="text" id="new-id" placeholder="ID (Ví dụ: 8383R)" class="input-premium w-full">
                    <input type="text" id="new-code" placeholder="Mã hàng hóa..." class="input-premium w-full">
                    <button class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-slate-200 transition">Push to database</button>
                </div>
            </div>
        </div>

        <!-- CỘT PHẢI -->
        <div class="lg:col-span-7 space-y-6">
            <div class="glass-card p-4 flex gap-4">
                <div class="relative flex-grow">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" id="filter-code" onkeyup="filterData()" placeholder="Search PN Number..." class="w-full bg-transparent p-2 pl-10 outline-none text-sm font-semibold">
                </div>
                <input type="text" id="filter-id" onkeyup="filterData()" placeholder="ID..." class="w-24 bg-slate-50 border-none rounded-xl p-2 text-center text-xs font-bold outline-none">
            </div>

            <div class="glass-card p-8">
                <h2 class="font-black text-slate-800 text-sm tech-font mb-6 flex items-center justify-between uppercase">
                    Master Inventory <span id="count-label" class="text-[10px] font-bold bg-blue-600 text-white px-2 py-1 rounded">0 RECORDS</span>
                </h2>
                <div id="product-list" class="space-y-4 max-h-[550px] overflow-y-auto pr-2">
                    <!-- List items -->
                </div>
            </div>
        </div>
    </main>

    <!-- IMAGE MODAL -->
    <div id="image-modal">
        <div class="absolute top-8 right-8 cursor-pointer w-12 h-12 flex items-center justify-center bg-slate-900 text-white rounded-full z-[1100]" onclick="closeModal()">
            <i class="fas fa-times text-xl"></i>
        </div>
        <div class="relative w-full h-full flex items-center justify-center p-10">
            <img id="zoom-img" src="" draggable="false">
        </div>
        <div class="absolute bottom-10 bg-white shadow-2xl px-8 py-5 rounded-3xl flex items-center gap-10 border border-slate-100">
            <button onclick="adjustZoom(-0.3)" class="text-slate-400 hover:text-blue-600 transition"><i class="fas fa-minus-circle text-2xl"></i></button>
            <input type="range" id="zoom-range" min="0.5" max="3" step="0.1" value="1" oninput="applyZoom(this.value)" class="w-40 accent-blue-600">
            <button onclick="adjustZoom(0.3)" class="text-slate-400 hover:text-blue-600 transition"><i class="fas fa-plus-circle text-2xl"></i></button>
            <button onclick="rotateImage()" class="text-slate-400 hover:text-blue-600 border-l pl-8"><i class="fas fa-sync-alt text-xl"></i></button>
        </div>
    </header>

    <script>
        const GAS_URL = "DÁN_WEB_APP_URL_CỦA_ANH_VÀO_ĐÂY";
        let inventoryData = [];
        let net;
        let currentScale = 1;
        let currentRotation = 0;

        // --- AI LOGIC ---
        async function initAI() {
            try {
                net = await mobilenet.load();
                document.getElementById('sys-status').innerText = "AI ONLINE";
                document.getElementById('sys-status').classList.replace('text-blue-600', 'text-green-600');
            } catch (e) {
                document.getElementById('sys-status').innerText = "AI ERROR";
            }
        }

        async function loadData() {
            try {
                const response = await fetch(GAS_URL);
                inventoryData = await response.json();
                renderList(inventoryData);
            } catch (err) {
                inventoryData = [{ id: "8383R", code: "3478290301", desc: "LINH KIỆN MẪU TEST UI", img: "https://via.placeholder.com/600", vector: "" }];
                renderList(inventoryData);
            }
        }

        async function runAIScan() {
            if (!net) return alert("AI chưa sẵn sàng!");
            const video = document.getElementById('video');
            if (video.classList.contains('hidden')) return alert("Hãy mở camera trước!");

            // Bật hiệu ứng Avengers HUD
            document.getElementById('ai-hud').style.display = 'block';

            // Phân tích
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 224, 224);
            const activation = net.infer(canvas, true);
            const capturedVector = await activation.data();

            const results = inventoryData.map(item => {
                if (!item.vector) return { ...item, score: 0 };
                const dbVector = item.vector.split('|').map(Number);
                const score = cosineSimilarity(capturedVector, dbVector);
                return { ...item, score: score };
            });

            results.sort((a, b) => b.score - a.score);

            setTimeout(() => {
                document.getElementById('ai-hud').style.display = 'none';
                renderList(results);
                alert(`Nhận diện: ${results[0].code} - Khớp: ${(results[0].score * 100).toFixed(1)}%`);
            }, 2500);
        }

        function cosineSimilarity(vecA, vecB) {
            let dotProduct = 0, mA = 0, mB = 0;
            for (let i = 0; i < vecA.length; i++) {
                dotProduct += vecA[i] * vecB[i];
                mA += vecA[i] * vecA[i];
                mB += vecB[i] * vecB[i];
            }
            return dotProduct / (Math.sqrt(mA) * Math.sqrt(mB));
        }

        // --- UI LOGIC ---
        function renderList(data) {
            const listContainer = document.getElementById('product-list');
            document.getElementById('count-label').innerText = `${data.length} RECORDS`;
            listContainer.innerHTML = '';
            data.forEach(item => {
                const matchHtml = item.score ? `<span class="text-[9px] text-blue-600 font-black block">${(item.score*100).toFixed(0)}% MATCH</span>` : '';
                listContainer.innerHTML += `
                    <div class="flex items-center gap-5 p-4 bg-white border border-slate-50 rounded-[20px] hover:border-blue-400 hover:shadow-xl transition-all duration-500 group">
                        <div class="w-16 h-16 rounded-2xl overflow-hidden bg-slate-100 cursor-zoom-in" onclick="openModal('${item.img}')">
                            <img src="${item.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>
                        <div class="flex-grow">
                            <h4 class="font-bold text-slate-800 text-sm tracking-tight mb-1">${item.code}</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">ID: ${item.id} • ${item.desc}</p>
                        </div>
                        <div class="text-right">
                            ${matchHtml}
                            <button onclick="openModal('${item.img}')" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                <i class="fas fa-expand-alt text-xs"></i>
                            </button>
                        </div>
                    </div>`;
            });
        }

        async function startCamera() {
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
                document.getElementById('laser').style.display = 'block';
            } catch (err) { alert("Vui lòng cấp quyền Camera!"); }
        }

        function openModal(src) {
            document.getElementById('zoom-img').src = src;
            document.getElementById('image-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            applyZoom(1);
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function applyZoom(val) {
            currentScale = val;
            document.getElementById('zoom-range').value = val;
            document.getElementById('zoom-img').style.transform = `scale(${currentScale}) rotate(${currentRotation}deg)`;
        }

        function adjustZoom(delta) {
            let newZoom = parseFloat(currentScale) + delta;
            if(newZoom >= 0.5 && newZoom <= 3) applyZoom(newZoom);
        }

        function rotateImage() { currentRotation += 90; applyZoom(currentScale); }

        function filterData() {
            const codeVal = document.getElementById('filter-code').value.toLowerCase();
            const idVal = document.getElementById('filter-id').value.toLowerCase();
            const filtered = inventoryData.filter(item => 
                String(item.code).toLowerCase().includes(codeVal) && String(item.id).toLowerCase().includes(idVal)
            );
            renderList(filtered);
        }

        initAI();
        loadData();
    </script>
</body>
</html>
